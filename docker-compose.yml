# ============================================================
# Docker Compose — Backend Template
# ============================================================
# Usage:
#   docker compose up -d              # Start app + default DB (PostgreSQL)
#   docker compose --profile mysql up  # Start app + MySQL
#   docker compose down -v             # Stop and remove volumes
# ============================================================

services:
  # ─── Go Application ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-template-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_DURATION=${ACCESS_TOKEN_DURATION:-6h}
      - REFRESH_TOKEN_DURATION=${REFRESH_TOKEN_DURATION:-24h}
      - APP_PORT=${APP_PORT}
    # Removed depends_on: postgres so the app can start independently with external databases
    restart: unless-stopped
    networks:
      - backend-network

  # ─── PostgreSQL (Default) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: backend-template-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-backend_template}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-network

  # ─── MySQL (Optional — enable with: docker compose --profile mysql up) ───
  # To use MySQL, set DB_TYPE=mysql, DB_HOST=mysql, DB_PORT=3306 in your .env
  mysql:
    image: mysql:8.0
    container_name: backend-template-mysql
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-backend_template}
      MYSQL_USER: ${DB_USER:-mysql}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mysql}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-network

  # ─── SQL Server (Optional — enable with: docker compose --profile sqlserver up) ───
  # To use SQL Server, set DB_TYPE=sqlserver, DB_HOST=sqlserver, DB_PORT=1433 in your .env
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: backend-template-sqlserver
    profiles:
      - sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P
            \"${DB_PASSWORD:-YourStrong!Passw0rd}\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-network

volumes:
  postgres_data:
  mysql_data:
  sqlserver_data:

networks:
  backend-network:
    driver: bridge
